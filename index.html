*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;min-height:100dvh;overscroll-behavior:none}
.app{max-width:480px;margin:0 auto;padding-bottom:72px;min-height:100vh;min-height:100dvh}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--border);z-index:50}
.topbar-title{font-size:17px;font-weight:600;letter-spacing:-.3px}
.topbar-right{display:flex;align-items:center;gap:6px}
.save-dot{width:7px;height:7px;border-radius:50%;background:var(--green);opacity:0;transition:opacity .4s}
.save-dot.on{opacity:1}
.save-ts{font-size:11px;color:var(--text3)}

/* bottom nav */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:var(--bg);border-top:1px solid var(--border);z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 10px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:10px;font-family:inherit;transition:color .15s}
.bnav-btn.active{color:var(--text)}
.bnav-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.bnav-icon svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* panels */
.panel{display:none;animation:fadeIn .15s ease}.panel.active{display:block}
@keyframes fadeIn{from{opacity:.6}to{opacity:1}}

/* year pills */
.yr-row{display:flex;gap:6px;overflow-x:auto;padding:12px 16px 4px;scrollbar-width:none}
.yr-row::-webkit-scrollbar{display:none}
.ypill{padding:5px 14px;font-size:12px;border:1px solid var(--border2);border-radius:20px;background:none;cursor:pointer;color:var(--text2);white-space:nowrap;font-family:inherit;transition:all .15s}
.ypill.active{background:var(--text);color:var(--bg);border-color:var(--text)}

/* kpi strip */
.kpi-strip{display:flex;gap:10px;overflow-x:auto;padding:10px 16px 4px;scrollbar-width:none}
.kpi-strip::-webkit-scrollbar{display:none}
.kpi{min-width:138px;background:var(--bg2);border-radius:var(--radius-sm);padding:12px 14px;flex-shrink:0}
.kpi-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.kpi-val{font-size:19px;font-weight:600;line-height:1.2}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:3px}

/* acct row */

.acct-box{flex:1;background:var(--bg2);border-radius:var(--radius-sm);padding:11px 12px}
.acct-box h3{font-size:11px;color:var(--text2);font-weight:500;margin-bottom:5px}
.acct-box .av{font-size:16px;font-weight:600}
.acct-box .as{font-size:10px;color:var(--text3);margin-top:3px}

/* section header */
.sec{padding:14px 16px 6px;display:flex;align-items:center;justify-content:space-between}
.sec h2{font-size:14px;font-weight:600}

/* cards */
.ccard{margin:0 16px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}

.ccard-sub{font-size:11px;color:var(--text3);margin-top:2px}
.ccard-body{padding:0 14px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
.ci label{font-size:10px;color:var(--text3);display:block;margin-bottom:2px}

.ccard-foot{display:flex;border-top:1px solid var(--border)}

/* div cards */

function persist(){

function hydrate(){
  let first=true;
  async function run(){
    if(window.firebaseHydrate){
      const data=await window.firebaseHydrate();
      if(data&&(data.tickers.length||data.dividends.length)){T=data.tickers;D=data.dividends;if(data.updatedAt)document.getElementById('save-ts').textContent=new Date(data.updatedAt).toLocaleDateString('ko-KR',{month:'short',day:'numeric'});}
      else{try{const rt=localStorage.getItem(SK_T),rd=localStorage.getItem(SK_D);if(rt)T=JSON.parse(rt);if(rd)D=JSON.parse(rd);}catch(e){}if(!T.length&&!D.length)seed();}
      first=false;
      if(window.firebaseListen)window.firebaseListen((d)=>{if(!first)return;T=d.tickers||[];D=d.dividends||[];if(d.updatedAt)document.getElementById('save-ts').textContent=new Date(d.updatedAt).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})+' 동기화';renderAll();});
    }else{try{const rt=localStorage.getItem(SK_T),rd=localStorage.getItem(SK_D),ts=localStorage.getItem(SK_TS);if(rt)T=JSON.parse(rt);if(rd)D=JSON.parse(rd);if(ts)document.getElementById('save-ts').textContent=new Date(+ts).toLocaleDateString('ko-KR',{month:'short',day:'numeric'});}catch(e){}if(!T.length&&!D.length)seed();}
    document.getElementById('loader').style.display='none';renderAll();
  }
  if(window._firebaseReady){run();}else{document.addEventListener('firebase-ready',run);setTimeout(()=>{if(!document.getElementById('loader').style.display)run();},3000);}
}
function flashSave(ts){
